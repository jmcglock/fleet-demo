apiVersion: apps/v1
kind: Deployment
metadata:
  name: from-code-to-cloud
  namespace: from-code-to-cloud
  labels:
    app: from-code-to-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: from-code-to-cloud
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      name: from-code-to-cloud
      labels:
        app: from-code-to-cloud
    spec:
      containers:
      - name: from-code-to-cloud
        image: ghcr.io/jmcglock/from-code-to-cloud:latest
        env:
        - name: TZ
          value: "America/New_York"
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
